<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with deep professional gradient -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg_grad)"/>
  <rect x="20" y="20" width="984" height="984" rx="200" stroke="white" stroke-opacity="0.05" stroke-width="40"/>
  
  <!-- Stylized Switch Chassis Shape -->
  <rect x="200" y="380" width="624" height="264" rx="40" fill="#2d333d" stroke="#10b981" stroke-width="12" stroke-opacity="0.8"/>
  
  <!-- Network Ports Grid -->
  <g transform="translate(260, 440)">
    <!-- Row of ports -->
    <rect width="60" height="60" rx="8" fill="#1f2228" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <rect x="80" width="60" height="60" rx="8" fill="#10b981" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <rect x="160" width="60" height="60" rx="8" fill="#1f2228" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <rect x="240" width="60" height="60" rx="8" fill="#1f2228" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <rect x="320" width="60" height="60" rx="8" fill="#10b981" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <rect x="400" width="60" height="60" rx="8" fill="#1f2228" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <rect x="480" width="60" height="60" rx="8" fill="#1f2228" stroke="white" stroke-opacity="0.2" stroke-width="4"/>

    <!-- Bottom row -->
    <rect y="80" width="60" height="60" rx="8" fill="#1f2228" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <rect x="80" y="80" width="60" height="60" rx="8" fill="#1f2228" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <rect x="160" y="80" width="60" height="60" rx="8" fill="#1f2228" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <rect x="240" y="80" width="60" height="60" rx="8" fill="#10b981" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <rect x="320" y="80" width="60" height="60" rx="8" fill="#1f2228" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <rect x="400" y="80" width="60" height="60" rx="8" fill="#1f2228" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <rect x="480" y="80" width="60" height="60" rx="8" fill="#1f2228" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
  </g>
  
  <!-- Glowing LEDs -->
  <circle cx="340" cy="500" r="8" fill="#10b981" filter="url(#glow)"/>
  <circle cx="580" cy="500" r="8" fill="#10b981" filter="url(#glow)"/>
  <circle cx="500" cy="580" r="8" fill="#10b981" filter="url(#glow)"/>
  
  <!-- Title / Identity -->
  <path d="M420 220H604V252H456V300H588V332H456V400H420V220Z" fill="white" fill-opacity="0.1"/>

  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2c3e50"/>
      <stop offset="1" stop-color="#1a1c20"/>
    </linearGradient>
    <filter id="glow" x="-10" y="-10" width="40" height="40" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <stop offset="0" stop-color="#10b981" stop-opacity="1"/>
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
</svg>
